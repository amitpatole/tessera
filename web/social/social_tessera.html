<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f5f1; --surface:#fffdf9; --panel:#efece4;
    --ink:#1b1a17; --ink-muted:#5c594f; --ink-faint:#6f6a61; --rule:#e3ded4;
    --accent:#4f8a7b; --accent-ink:#356b5d;
    --serif:"Source Serif 4",Georgia,serif; --sans:"Inter",system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1280px;height:640px;overflow:hidden;background:var(--bg);
       color:var(--ink);font-family:var(--sans);display:flex}
  .spine{width:8px;height:100%;background:var(--accent)}
  .pad{flex:1;padding:80px 92px 60px;display:flex;flex-direction:column;justify-content:space-between;position:relative}
  /* faint tessera-tile motif, top-right */
  .tiles{position:absolute;top:54px;right:70px;display:grid;grid-template-columns:repeat(4,46px);gap:12px;opacity:1}
  .tiles i{display:block;width:46px;height:30px;border-radius:3px;background:var(--accent)}
  .eyebrow{font-size:21px;letter-spacing:.2em;text-transform:uppercase;
           color:var(--accent-ink);font-weight:600;display:flex;align-items:center;gap:14px}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
  h1{font-family:var(--serif);font-size:104px;line-height:.96;letter-spacing:-.02em;
     font-weight:600;margin:22px 0 20px;color:var(--ink)}
  h1 b{color:var(--accent-ink);font-weight:600}
  .rule{width:96px;height:1px;background:var(--rule);margin:0 0 24px}
  .tag{font-family:var(--serif);font-size:33px;line-height:1.4;color:var(--ink-muted);
       max-width:880px;font-weight:400}
  .tag b{color:var(--ink);font-weight:600}
  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:30px}
  .chips{display:flex;gap:14px;align-items:center}
  .chip{font-family:var(--mono);font-size:20px;color:var(--ink);background:var(--panel);
        border:1px solid var(--rule);border-radius:8px;padding:11px 20px}
  .chip.q{background:transparent;color:var(--ink-faint);border-color:transparent;padding-left:0}
  .sig{font-family:var(--serif);font-style:italic;font-size:24px;color:var(--accent-ink)}
</style></head>
<body>
  <div class="spine"></div>
  <div class="pad">
    <div class="tiles"><i></i><i></i><i style="opacity:.45"></i><i></i><i style="opacity:.3"></i><i></i><i></i><i style="opacity:.5"></i></div>
    <div>
      <div class="eyebrow"><span class="dot"></span>Attested analytics · regulated finance</div>
      <h1>Every number,<br><b>proven.</b></h1>
      <div class="rule"></div>
      <div class="tag">The number, the SQL, an <b>independent verdict</b>, and a <b>signed receipt</b>
        your auditors verify offline. Not a chatbot — the trust layer underneath it.</div>
    </div>
    <div class="foot">
      <div class="chips">
        <span class="chip">tessera.amitinfotech.net</span>
        <span class="chip q">8/8 errors caught · 30.5% cheaper · 100% accuracy</span>
      </div>
      <div class="sig">— amitpatole</div>
    </div>
  </div>
</body></html>
